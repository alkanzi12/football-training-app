name: football_training_app
description: تطبيق تدريب كرة القدم الشامل باللغة العربية
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  
  # UI & Localization
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Image & Media
  image_picker: ^1.0.0
  video_player: ^2.8.0
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  
  # Date & Time
  table_calendar: ^3.0.0
  
  # Utilities
  shared_preferences: ^2.2.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/localization/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700